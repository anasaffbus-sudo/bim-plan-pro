services:
  - type: web
    name: bim-plan-pro
    env: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ADMIN_EMAILS
        value: anas.affbus@gmail.com
      - key: DATABASE_URL
        fromDatabase:
          name: bim-plan-pro-db
          property: connectionString

databases:
  - name: bim-plan-pro-db
    plan: free
    databaseName: bimplan
    user: bimplan
